<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/pikachu.png">
<title>청여고 미니게임 ⚡</title>
<style>
  :root {
    --bg: #fff3c4;
    --bg2: #ffe07a;
    --panel: #fffdf7;
    --cell: #fdeec0;
    --cell-hover: #fbe49a;
    --accent: #f5a800;
    --accent-ink: #5a3d00;
    --accent-glow: rgba(245, 168, 0, 0.55);
    --good: #1fa463;
    --text: #4a3a12;
    --muted: #a58a4c;
    --gold: #ef5a24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 0%, #fff8d6 0%, var(--bg) 55%, var(--bg2) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 32px 18px 40px;
    overflow-x: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header { text-align: center; margin-bottom: 26px; }
  .hero {
    width: 128px; height: 128px; border-radius: 50%;
    object-fit: cover; object-position: center;
    background: linear-gradient(160deg, #fff6cf, #ffe89a);
    border: 4px solid var(--accent);
    box-shadow: 0 10px 28px var(--accent-glow);
    display: block;
    margin: 0 auto 12px;
  }
  h1 { font-size: 2rem; letter-spacing: 1px; margin-bottom: 6px; display: inline-flex; align-items: center; gap: 10px; }
  .logo-icon {
    height: 1.7em; width: 1.7em;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--accent);
    box-shadow: 0 2px 8px var(--accent-glow);
    padding: 4px;
    object-fit: contain;
  }
  .subtitle { color: var(--muted); font-size: 0.95rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    max-width: 820px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid rgba(214,170,60,0.35);
    border-radius: 18px;
    padding: 20px 18px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    transition: transform 0.12s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 14px rgba(180,140,0,0.10);
  }
  a.card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(245,168,0,0.28); }
  a.card:active { transform: translateY(-1px); }
  .card .emoji { font-size: 2.2rem; line-height: 1; }
  .card .title { font-size: 1.15rem; font-weight: 700; }
  .card .genre { font-size: 0.72rem; color: var(--accent-ink); background: var(--cell); align-self: flex-start; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
  .card .desc { font-size: 0.85rem; color: var(--muted); line-height: 1.45; }
  .card.soon { opacity: 0.62; cursor: default; }
  .badge {
    position: absolute; top: 14px; right: 14px;
    font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  }
  .badge.play { background: var(--good); color: #fff; }
  .badge.wip { background: var(--cell-hover); color: var(--accent-ink); }

  footer { text-align: center; margin-top: 32px; color: var(--muted); font-size: 0.75rem; line-height: 1.6; }

  @media (max-width: 560px) {
    body { padding: 22px 12px 30px; }
    h1 { font-size: 1.6rem; }
    .hero { width: 104px; height: 104px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { padding: 15px 13px; border-radius: 15px; }
    .card .emoji { font-size: 1.9rem; }
    .card .title { font-size: 1rem; }
    .card .desc { display: none; }
  }
</style>
</head>
<body>
  <header>
    <img class="hero" src="assets/face.jpg" alt="청여고 미니게임">
    <h1>청여고 미니게임 <img class="logo-icon" src="assets/logo.png" alt="청주여고 로고"></h1>
    <div class="subtitle">플레이할 게임을 골라보세요 · 반응속도 · 기억력 · 리듬 · 퍼즐</div>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    © copyright 청주여자고등학교 백승관 선생님<br>
    모든 게임은 이 브라우저에 기록이 저장됩니다
  </footer>

<script>
  // 게임 목록 — 새 게임을 만들면 ready:true 로 바꾸고 slug 폴더를 추가하세요.
  const GAMES = [
    { slug: 'reflex', emoji: '🎯', title: '반사신경 테스트', genre: '순발력', desc: '반짝이는 칸을 최대한 빠르게! 콤보·랭킹', ready: true },
    { slug: 'memory', emoji: '🃏', title: '기억력 카드 매칭', genre: '기억력', desc: '피카츄 카드를 뒤집어 짝 맞추기', ready: false },
    { slug: 'whack',  emoji: '🔨', title: '피카츄 잡기', genre: '순발력', desc: '튀어나오는 피카츄를 재빨리 탭!', ready: false },
    { slug: 'rhythm', emoji: '🎵', title: '리듬 탭', genre: '리듬', desc: '박자에 맞춰 내려오는 노트를 탭', ready: false },
    { slug: 'simon',  emoji: '🌈', title: '색깔 순서 기억', genre: '순서기억', desc: '반짝인 순서대로 따라 누르기', ready: false },
    { slug: 'slide',  emoji: '🧩', title: '슬라이딩 퍼즐', genre: '공간퍼즐', desc: '피카츄 그림 조각을 밀어 맞추기', ready: false },
    { slug: 'merge',  emoji: '🔢', title: '합치기 퍼즐', genre: '숫자퍼즐', desc: '같은 타일을 밀어 합치기 (2048)', ready: false },
  ];

  const grid = document.getElementById('grid');
  GAMES.forEach(g => {
    const inner =
      `<span class="emoji">${g.emoji}</span>` +
      `<span class="genre">${g.genre}</span>` +
      `<span class="title">${g.title}</span>` +
      `<span class="desc">${g.desc}</span>` +
      `<span class="badge ${g.ready ? 'play' : 'wip'}">${g.ready ? 'PLAY' : '준비 중'}</span>`;
    let el;
    if (g.ready) {
      el = document.createElement('a');
      el.className = 'card';
      el.href = g.slug + '/';
    } else {
      el = document.createElement('div');
      el.className = 'card soon';
    }
    el.innerHTML = inner;
    grid.appendChild(el);
  });
</script>
</body>
</html>
