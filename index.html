<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반사신경 그리드 🎯</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --cell: #272b3a;
    --cell-hover: #323750;
    --accent: #ff5470;
    --accent-glow: rgba(255, 84, 112, 0.6);
    --good: #36e2a4;
    --text: #e8eaf2;
    --muted: #7a8099;
    --gold: #ffb454;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1c2030 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    font-size: 1.9rem;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }

  .stats {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: var(--panel);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 92px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
  .stat .value.accent { color: var(--accent); }
  .stat .value.good { color: var(--good); }
  .stat .value.combo { color: var(--muted); transition: color 0.15s, transform 0.15s; }
  .stat .value.combo.hot { color: var(--gold); transform: scale(1.12); text-shadow: 0 0 12px rgba(255,180,84,0.6); }

  .controls { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 11px 26px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 4px 18px var(--accent-glow);
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.45; cursor: default; box-shadow: none; transform: none; }

  .size-toggle { display: flex; background: var(--panel); border-radius: 10px; overflow: hidden; }
  .size-toggle button {
    background: transparent;
    box-shadow: none;
    padding: 11px 16px;
    border-radius: 0;
    font-weight: 500;
    color: var(--muted);
  }
  .size-toggle button.active { background: var(--cell-hover); color: var(--text); }

  .icon-btn {
    background: var(--panel);
    box-shadow: none;
    padding: 11px 14px;
    font-size: 1.1rem;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--cell-hover); transform: none; }
  .icon-btn.muted { opacity: 0.55; }

  .ghost-btn { background: var(--panel); box-shadow: none; }
  .ghost-btn:hover { background: var(--cell-hover); transform: none; }
  .ghost-btn:disabled { opacity: 0.4; }

  #grid {
    display: grid;
    gap: clamp(8px, 2.5vw, 12px);
    width: min(92vw, 420px);   /* 화면 폭에 맞춰 자동 조절, 데스크톱 상한 420px */
    margin: 0 auto 14px;
    touch-action: manipulation;
  }
  .cell {
    width: 100%;
    aspect-ratio: 1 / 1;       /* 정사각형 유지하며 너비에 따라 크기 결정 */
    background: var(--cell);
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.06s, transform 0.06s;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .cell:hover { background: var(--cell-hover); }
  .cell.lit {
    background: var(--accent);
    box-shadow: 0 0 26px var(--accent-glow), inset 0 0 12px rgba(255,255,255,0.25);
    transform: scale(1.04);
  }
  .cell.miss {
    background: #44303a;
    transition: background 0.25s;
  }
  #grid.paused { opacity: 0.3; filter: grayscale(0.5); pointer-events: none; transition: opacity 0.15s; }

  #message {
    height: 26px;
    color: var(--muted);
    font-size: 0.95rem;
    text-align: center;
  }
  #message .hit { color: var(--good); font-weight: 600; }
  #message .bad { color: var(--accent); font-weight: 600; }
  #message .combo { color: var(--gold); font-weight: 600; }

  .ranking {
    width: min(92vw, 420px);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px 16px;
    margin-top: 6px;
  }
  .ranking-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ranking-title { font-size: 0.9rem; font-weight: 600; }
  .ranking-title small { color: var(--muted); font-weight: 400; font-size: 0.72rem; margin-left: 4px; }
  .link-btn {
    background: transparent; box-shadow: none; color: var(--muted);
    padding: 4px 8px; font-size: 0.72rem; font-weight: 500; border-radius: 6px;
  }
  .link-btn:hover { background: var(--cell); color: var(--text); transform: none; }
  .rank-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .rank-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; background: var(--cell); border-radius: 9px; font-size: 0.86rem;
  }
  .rank-list li .pos { width: 22px; text-align: center; font-weight: 700; color: var(--muted); }
  .rank-list li .sc { font-weight: 700; color: var(--good); min-width: 58px; }
  .rank-list li .meta { color: var(--muted); font-size: 0.76rem; margin-left: auto; }
  .rank-list li.top1 { background: linear-gradient(90deg, rgba(255,180,84,0.18), var(--cell)); }
  .rank-list li.empty { justify-content: center; color: var(--muted); font-size: 0.8rem; }

  .footer { margin-top: 10px; color: var(--muted); font-size: 0.78rem; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <h1>반사신경 그리드 🎯</h1>
  <div class="subtitle">반짝이는 칸을 최대한 빠르게 누르세요 · 한 판 30초</div>

  <div class="stats">
    <div class="stat"><div class="label">남은 시간</div><div class="value" id="time">30.0</div></div>
    <div class="stat"><div class="label">점수</div><div class="value accent" id="score">0</div></div>
    <div class="stat"><div class="label">콤보</div><div class="value combo" id="combo">—</div></div>
    <div class="stat"><div class="label">최고점</div><div class="value good" id="best">—</div></div>
  </div>

  <div class="controls">
    <button id="startBtn">시작</button>
    <button id="pauseBtn" class="ghost-btn" disabled>⏸ 멈춤</button>
    <div class="size-toggle" id="sizeToggle">
      <button data-size="3" class="active">3×3</button>
      <button data-size="4">4×4</button>
      <button data-size="5">5×5 🔥</button>
    </div>
    <button id="muteBtn" class="icon-btn" title="음소거 / 켜기" aria-label="음소거">🔊</button>
  </div>

  <div id="grid"></div>
  <div id="message">시작 버튼을 누르고 준비하세요!</div>

  <div class="ranking">
    <div class="ranking-head">
      <span class="ranking-title">🏆 랭킹 <small>이 브라우저 기록</small></span>
      <button id="clearRanks" class="link-btn" title="랭킹 기록 삭제">기록 지우기</button>
    </div>
    <ol id="rankList" class="rank-list"></ol>
  </div>

  <div class="footer">
    빠르고 정확할수록, 연속으로 맞힐수록 고득점 · 빈 칸을 누르면 콤보가 끊기고 감점<br>
    난이도가 높을수록 점수 배율↑ · 🔊 게임 중 배경음악·효과음 재생 (기록은 이 브라우저에 저장)
  </div>

<script>
(function () {
  const gridEl   = document.getElementById('grid');
  const timeEl   = document.getElementById('time');
  const scoreEl  = document.getElementById('score');
  const comboEl  = document.getElementById('combo');
  const bestEl   = document.getElementById('best');
  const msgEl    = document.getElementById('message');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const sizeToggle = document.getElementById('sizeToggle');
  const muteBtn  = document.getElementById('muteBtn');
  const rankListEl = document.getElementById('rankList');
  const clearRanksBtn = document.getElementById('clearRanks');

  const ROUND_MS = 30000;
  const MISS_PENALTY = 120;  // 빈 칸 클릭 시 점수 감점
  const RANK_KEY = 'reflexGridRanks';

  let size = 3;
  let cells = [];
  let playing = false;
  let paused = false;
  let pauseAt = 0;          // 일시정지 시작 시각 (보정용)
  let litIndex = -1;
  let litAt = 0;
  let reactionTimes = [];   // 명중한 반응속도(ms)만 저장 (종료 시 평균 표시용)
  let gameScore = 0;        // 합산 점수 (반응속도×콤보×난이도)
  let combo = 0;            // 현재 연속 명중
  let maxCombo = 0;         // 판 내 최고 콤보
  let hits = 0;             // 명중 횟수
  let penalties = 0;        // 빈 칸 클릭 횟수
  let endAt = 0;
  let nextTimeout = null;
  let rafId = null;

  // ===== 점수/랭킹 유틸 =====
  function sizeMult() { return size === 5 ? 1.75 : size === 4 ? 1.35 : 1; }
  function comboMult() { return 1 + Math.min(Math.max(combo - 1, 0), 15) * 0.1; } // 콤보2→1.1 … 최대 2.5

  function loadRanks() {
    try { return JSON.parse(localStorage.getItem(RANK_KEY)) || []; }
    catch (e) { return []; }
  }
  function bestScore() { const r = loadRanks(); return r.length ? r[0].score : 0; }
  function updateBest() {
    const b = bestScore();
    bestEl.textContent = b ? b.toLocaleString() : '—';
  }
  function renderRanks() {
    const ranks = loadRanks();
    rankListEl.innerHTML = '';
    if (ranks.length === 0) {
      rankListEl.innerHTML = '<li class="empty">아직 기록이 없어요 — 한 판 해보세요!</li>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    ranks.slice(0, 5).forEach((r, i) => {
      const li = document.createElement('li');
      if (i === 0) li.className = 'top1';
      li.innerHTML =
        `<span class="pos">${medals[i] || (i + 1)}</span>` +
        `<span class="sc">${r.score.toLocaleString()}</span>` +
        `<span class="meta">${r.size}×${r.size} · 최고 ${r.combo}콤보</span>`;
      rankListEl.appendChild(li);
    });
  }
  // 이번 판 기록 저장 후, 진입 순위(1-based) 반환 (없으면 0)
  function saveRank() {
    if (hits < 3 || gameScore <= 0) return 0;
    const ranks = loadRanks();
    const entry = { score: gameScore, size: size, combo: maxCombo, date: Date.now() };
    ranks.push(entry);
    ranks.sort((a, b) => b.score - a.score);
    const top = ranks.slice(0, 8);
    localStorage.setItem(RANK_KEY, JSON.stringify(top));
    const pos = top.indexOf(entry);
    return pos === -1 ? 0 : pos + 1;
  }

  // ===== 게임 음악 (Web Audio로 실시간 합성 — 외부 파일/저작권 없음) =====
  let audioCtx = null, masterGain = null, musicTimer = null;
  let noteIndex = 0, nextNoteTime = 0;
  let muted = localStorage.getItem('reflexGridMuted') === '1';
  const MUSIC_VOL = 0.16;
  function targetVol() { return muted ? 0.0001 : MUSIC_VOL; }
  const TEMPO = 132;                  // BPM
  const STEP = 60 / TEMPO / 2;        // 8분음표 길이(초)
  // 밝은 펜타토닉 멜로디/베이스 — 무한 루프해도 잘 안 질리는 진행
  const MELODY = [659.25, 587.33, 523.25, 587.33, 659.25, 659.25, 659.25, 587.33,
                  523.25, 523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 523.25];
  const BASS   = [130.81, 130.81, 174.61, 174.61, 196.00, 196.00, 146.83, 146.83];

  function initAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;          // 미지원 브라우저면 음악 없이 진행
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = targetVol();
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return true;
  }

  function blip(freq, time, dur, type, vol) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(g); g.connect(masterGain);
    osc.start(time);
    osc.stop(time + dur + 0.03);
  }

  function scheduler() {
    // 가까운 미래(0.1초)까지의 음표를 미리 스케줄 — 타이밍 안정적
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
      blip(MELODY[noteIndex % MELODY.length], nextNoteTime, STEP * 0.9, 'square', 0.5);
      if (noteIndex % 2 === 0) {
        blip(BASS[(noteIndex / 2) % BASS.length], nextNoteTime, STEP * 1.7, 'triangle', 0.85);
      }
      nextNoteTime += STEP;
      noteIndex++;
    }
  }

  function startMusic() {
    if (!initAudio()) return;
    noteIndex = 0;
    nextNoteTime = audioCtx.currentTime + 0.06;
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(0.0001, now);            // 페이드 인 (음소거면 그대로 무음)
    masterGain.gain.linearRampToValueAtTime(targetVol(), now + 0.3);
    scheduler();
    musicTimer = setInterval(scheduler, 25);
  }

  function stopMusic() {
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    if (audioCtx && masterGain) {
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0.0001, now + 0.25);  // 페이드 아웃
    }
  }

  // 게임 종료 징글 — 루프 페이드아웃 후 짧게 울림 (masterGain을 거치지 않고 직접 출력)
  function playEndJingle(win) {
    if (muted || !audioCtx) return;
    const start = audioCtx.currentTime + 0.2;   // 배경 루프 페이드아웃 뒤에
    const notes = win
      ? [523.25, 659.25, 783.99, 1046.50]       // C-E-G-C↑ : 밝은 승리 팡파레
      : [659.25, 587.33, 523.25, 392.00];       // E-D-C-G↓ : 부드러운 마무리
    const step = 0.15;
    notes.forEach((f, i) => {
      const t = start + i * step;
      const last = i === notes.length - 1;
      const dur = last ? 0.7 : step * 1.5;       // 마지막 음은 길게 울려 여운
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + dur + 0.05);
    });
  }

  // ===== 효과음 (배경음악과 별개로 즉시 재생, 음소거 시 무음) =====
  function envTone(freq, start, dur, type, vol) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(start); osc.stop(start + dur + 0.03);
    return osc;
  }
  function sfxHit() {
    if (muted || !audioCtx) return;
    const now = audioCtx.currentTime;
    const semis = Math.min(combo - 1, 14);           // 콤보가 오를수록 반음씩 상승
    const base = 620 * Math.pow(2, semis / 12);
    envTone(base, now, 0.10, 'square', 0.16);
    envTone(base * 1.5, now + 0.015, 0.09, 'square', 0.09);
  }
  function sfxMiss() {
    if (muted || !audioCtx) return;
    const now = audioCtx.currentTime;
    const o = envTone(150, now, 0.20, 'sawtooth', 0.15);
    o.frequency.exponentialRampToValueAtTime(80, now + 0.2);  // 하강 buzz
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;  // 칸은 CSS가 반응형으로 크기 결정
    cells = [];
    const count = size * size;
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.index = i;
      c.addEventListener('pointerdown', onCellPress);
      gridEl.appendChild(c);
      cells.push(c);
    }
  }

  function onCellPress(e) {
    if (!playing || paused) return;
    const idx = parseInt(e.currentTarget.dataset.index, 10);
    if (idx === litIndex) {
      // ===== 명중 =====
      const rt = performance.now() - litAt;
      reactionTimes.push(rt);
      hits++;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      const speedPts = Math.min(650, Math.max(60, Math.round(650 - rt * 0.85)));
      const mult = comboMult();
      const gained = Math.round(speedPts * mult * sizeMult());
      gameScore += gained;
      updateScore();
      updateCombo();
      cells[litIndex].classList.remove('lit');
      litIndex = -1;
      sfxHit();
      let m = `<span class="hit">+${gained.toLocaleString()}</span>`;
      if (combo >= 2) m += ` <span class="combo">×${mult.toFixed(1)} · ${combo}콤보 🔥</span>`;
      flash(m);
      scheduleNext(200);
    } else {
      // ===== 빈 칸 — 콤보 끊김 + 감점 =====
      penalties++;
      combo = 0;
      gameScore = Math.max(0, gameScore - MISS_PENALTY);
      updateScore();
      updateCombo();
      const c = e.currentTarget;
      c.classList.add('miss');
      setTimeout(() => c.classList.remove('miss'), 250);
      sfxMiss();
      flash(`<span class="bad">−${MISS_PENALTY} · 콤보 끊김</span>`);
    }
  }

  function updateScore() { scoreEl.textContent = gameScore.toLocaleString(); }
  function updateCombo() {
    comboEl.textContent = combo > 0 ? combo + '×' : '—';
    comboEl.classList.toggle('hot', combo >= 5);
  }

  // 명중 반응속도만 사용한 평균(ms) — 종료 화면 표시용
  function avgReaction() {
    if (reactionTimes.length === 0) return null;
    return reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length;
  }

  function flash(html) {
    msgEl.innerHTML = html;
  }

  function scheduleNext(delay) {
    clearTimeout(nextTimeout);
    nextTimeout = setTimeout(litUp, delay);
  }

  function litUp() {
    if (!playing) return;
    let idx;
    do { idx = Math.floor(Math.random() * cells.length); }
    while (idx === litIndex && cells.length > 1);
    litIndex = idx;
    cells[idx].classList.add('lit');
    litAt = performance.now();
  }

  function tick() {
    const remain = Math.max(0, endAt - performance.now());
    timeEl.textContent = (remain / 1000).toFixed(1);
    if (remain <= 0) { endGame(); return; }
    rafId = requestAnimationFrame(tick);
  }

  function startGame() {
    playing = true;
    paused = false;
    pauseBtn.disabled = false;
    pauseBtn.textContent = '⏸ 멈춤';
    gridEl.classList.remove('paused');
    gameScore = 0;
    combo = 0;
    maxCombo = 0;
    hits = 0;
    penalties = 0;
    litIndex = -1;
    reactionTimes = [];
    updateScore();
    updateCombo();
    startBtn.disabled = true;
    setToggleEnabled(false);
    flash('집중! 🔥');
    startMusic();                       // 게임 시작과 함께 음악 재생
    endAt = performance.now() + ROUND_MS;
    tick();
    scheduleNext(600);
  }

  function endGame() {
    playing = false;
    paused = false;
    pauseBtn.disabled = true;
    pauseBtn.textContent = '⏸ 멈춤';
    gridEl.classList.remove('paused');
    stopMusic();                        // 게임 종료와 함께 음악 정지
    cancelAnimationFrame(rafId);
    clearTimeout(nextTimeout);
    if (litIndex >= 0) { cells[litIndex].classList.remove('lit'); litIndex = -1; }
    combo = 0;
    updateCombo();
    timeEl.textContent = '0.0';
    startBtn.disabled = false;
    startBtn.textContent = '다시 시작';
    setToggleEnabled(true);

    const avgMs = avgReaction();
    let result = `끝! <span class="hit">${gameScore.toLocaleString()}점</span>`;
    if (hits > 0) result += ` · ${hits}개 명중`;
    if (avgMs !== null) result += ` · 평균 ${Math.round(avgMs)}ms`;
    if (maxCombo >= 2) result += ` · 최고 <span class="combo">${maxCombo}콤보</span>`;

    // 랭킹 저장 & 순위 표시
    const rank = saveRank();
    let newRecord = false;
    if (rank === 1) {
      result += ' 🏆 <span class="hit">1위 신기록!</span>';
      newRecord = true;
    } else if (rank > 0) {
      result += ` · 랭킹 <span class="combo">${rank}위</span> 진입!`;
    }
    updateBest();
    renderRanks();
    flash(result);
    playEndJingle(newRecord);           // 종료 징글: 1위 신기록이면 승리 팡파레
  }

  function setToggleEnabled(on) {
    sizeToggle.querySelectorAll('button').forEach(b => b.disabled = !on);
  }

  function pauseGame() {
    if (!playing || paused) return;
    paused = true;
    pauseAt = performance.now();
    cancelAnimationFrame(rafId);        // 타이머 정지
    clearTimeout(nextTimeout);          // 다음 불빛 예약 취소
    stopMusic();                        // 음악 정지
    gridEl.classList.add('paused');     // 그리드 흐리게 + 클릭 차단
    pauseBtn.textContent = '▶ 계속';
    flash('⏸ 일시정지');
  }

  function resumeGame() {
    if (!playing || !paused) return;
    const pausedFor = performance.now() - pauseAt;
    paused = false;
    endAt += pausedFor;                 // 남은 시간 보존
    if (litIndex >= 0) litAt += pausedFor;  // 반응시간에 정지시간이 포함되지 않도록 보정
    gridEl.classList.remove('paused');
    pauseBtn.textContent = '⏸ 멈춤';
    startMusic();                       // 음악 재개 (음소거면 그대로 무음)
    tick();                             // 타이머 재개
    if (litIndex < 0) scheduleNext(300);  // 불이 꺼진 상태였다면 흐름 다시 시작
    flash('계속! 🔥');
  }

  pauseBtn.addEventListener('click', () => { paused ? resumeGame() : pauseGame(); });

  sizeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || playing) return;
    size = parseInt(btn.dataset.size, 10);
    sizeToggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
    buildGrid();
  });

  startBtn.addEventListener('click', startGame);

  function updateMuteUI() {
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('muted', muted);
    muteBtn.title = muted ? '음소거됨 — 켜기' : '소리 켜짐 — 음소거';
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('reflexGridMuted', muted ? '1' : '0');
    updateMuteUI();
    // 게임 중이면 볼륨을 즉시 부드럽게 반영
    if (audioCtx && masterGain && playing) {
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(targetVol(), now + 0.12);
    }
  });

  clearRanksBtn.addEventListener('click', () => {
    if (loadRanks().length === 0) return;
    if (confirm('저장된 랭킹 기록을 모두 지울까요?')) {
      localStorage.removeItem(RANK_KEY);
      updateBest();
      renderRanks();
    }
  });

  // 초기화
  updateMuteUI();
  updateBest();
  renderRanks();
  buildGrid();
})();
</script>
</body>
</html>
