<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반사신경 그리드 🎯</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --cell: #272b3a;
    --cell-hover: #323750;
    --accent: #ff5470;
    --accent-glow: rgba(255, 84, 112, 0.6);
    --good: #36e2a4;
    --text: #e8eaf2;
    --muted: #7a8099;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1c2030 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    font-size: 1.9rem;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }

  .stats {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: var(--panel);
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 92px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
  .stat .value.accent { color: var(--accent); }
  .stat .value.good { color: var(--good); }

  .controls { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 11px 26px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 4px 18px var(--accent-glow);
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.45; cursor: default; box-shadow: none; transform: none; }

  .size-toggle { display: flex; background: var(--panel); border-radius: 10px; overflow: hidden; }
  .size-toggle button {
    background: transparent;
    box-shadow: none;
    padding: 11px 16px;
    border-radius: 0;
    font-weight: 500;
    color: var(--muted);
  }
  .size-toggle button.active { background: var(--cell-hover); color: var(--text); }

  .icon-btn {
    background: var(--panel);
    box-shadow: none;
    padding: 11px 14px;
    font-size: 1.1rem;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--cell-hover); transform: none; }
  .icon-btn.muted { opacity: 0.55; }

  #grid {
    display: grid;
    gap: clamp(8px, 2.5vw, 12px);
    width: min(92vw, 420px);   /* 화면 폭에 맞춰 자동 조절, 데스크톱 상한 420px */
    margin: 0 auto 14px;
    touch-action: manipulation;
  }
  .cell {
    width: 100%;
    aspect-ratio: 1 / 1;       /* 정사각형 유지하며 너비에 따라 크기 결정 */
    background: var(--cell);
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.06s, transform 0.06s;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .cell:hover { background: var(--cell-hover); }
  .cell.lit {
    background: var(--accent);
    box-shadow: 0 0 26px var(--accent-glow), inset 0 0 12px rgba(255,255,255,0.25);
    transform: scale(1.04);
  }
  .cell.miss {
    background: #44303a;
    transition: background 0.25s;
  }

  #message {
    height: 26px;
    color: var(--muted);
    font-size: 0.95rem;
    text-align: center;
  }
  #message .hit { color: var(--good); font-weight: 600; }
  #message .bad { color: var(--accent); font-weight: 600; }

  .footer { margin-top: 10px; color: var(--muted); font-size: 0.78rem; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <h1>반사신경 그리드 🎯</h1>
  <div class="subtitle">반짝이는 칸을 최대한 빠르게 누르세요 · 한 판 30초</div>

  <div class="stats">
    <div class="stat"><div class="label">남은 시간</div><div class="value" id="time">30.0</div></div>
    <div class="stat"><div class="label">점수</div><div class="value accent" id="score">0</div></div>
    <div class="stat"><div class="label">평균 반응</div><div class="value" id="avg">— ms</div></div>
    <div class="stat"><div class="label">최고 기록</div><div class="value good" id="best">— ms</div></div>
  </div>

  <div class="controls">
    <button id="startBtn">시작</button>
    <div class="size-toggle" id="sizeToggle">
      <button data-size="3" class="active">3×3</button>
      <button data-size="4">4×4</button>
    </div>
    <button id="muteBtn" class="icon-btn" title="음소거 / 켜기" aria-label="음소거">🔊</button>
  </div>

  <div id="grid"></div>
  <div id="message">시작 버튼을 누르고 준비하세요!</div>

  <div class="footer">
    빠를수록 좋습니다 · 빈 칸을 누르면 페널티(+100ms)<br>
    최고 기록은 이 브라우저에 저장됩니다 · 🔊 게임 중 배경음악 재생
  </div>

<script>
(function () {
  const gridEl   = document.getElementById('grid');
  const timeEl   = document.getElementById('time');
  const scoreEl  = document.getElementById('score');
  const avgEl    = document.getElementById('avg');
  const bestEl   = document.getElementById('best');
  const msgEl    = document.getElementById('message');
  const startBtn = document.getElementById('startBtn');
  const sizeToggle = document.getElementById('sizeToggle');
  const muteBtn  = document.getElementById('muteBtn');

  const ROUND_MS = 30000;
  const PENALTY_MS = 100;

  let size = 3;
  let cells = [];
  let playing = false;
  let litIndex = -1;
  let litAt = 0;
  let reactionTimes = [];   // 명중한 반응속도(ms)만 저장
  let score = 0;
  let penalties = 0;        // 빈 칸 클릭 횟수
  let endAt = 0;
  let nextTimeout = null;
  let rafId = null;

  // 최고 기록 불러오기 (낮을수록 좋음)
  let best = parseFloat(localStorage.getItem('reflexGridBest'));
  if (!isNaN(best)) bestEl.textContent = Math.round(best) + ' ms';

  // ===== 게임 음악 (Web Audio로 실시간 합성 — 외부 파일/저작권 없음) =====
  let audioCtx = null, masterGain = null, musicTimer = null;
  let noteIndex = 0, nextNoteTime = 0;
  let muted = localStorage.getItem('reflexGridMuted') === '1';
  const MUSIC_VOL = 0.16;
  function targetVol() { return muted ? 0.0001 : MUSIC_VOL; }
  const TEMPO = 132;                  // BPM
  const STEP = 60 / TEMPO / 2;        // 8분음표 길이(초)
  // 밝은 펜타토닉 멜로디/베이스 — 무한 루프해도 잘 안 질리는 진행
  const MELODY = [659.25, 587.33, 523.25, 587.33, 659.25, 659.25, 659.25, 587.33,
                  523.25, 523.25, 587.33, 659.25, 587.33, 523.25, 440.00, 523.25];
  const BASS   = [130.81, 130.81, 174.61, 174.61, 196.00, 196.00, 146.83, 146.83];

  function initAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;          // 미지원 브라우저면 음악 없이 진행
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = targetVol();
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return true;
  }

  function blip(freq, time, dur, type, vol) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(g); g.connect(masterGain);
    osc.start(time);
    osc.stop(time + dur + 0.03);
  }

  function scheduler() {
    // 가까운 미래(0.1초)까지의 음표를 미리 스케줄 — 타이밍 안정적
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
      blip(MELODY[noteIndex % MELODY.length], nextNoteTime, STEP * 0.9, 'square', 0.5);
      if (noteIndex % 2 === 0) {
        blip(BASS[(noteIndex / 2) % BASS.length], nextNoteTime, STEP * 1.7, 'triangle', 0.85);
      }
      nextNoteTime += STEP;
      noteIndex++;
    }
  }

  function startMusic() {
    if (!initAudio()) return;
    noteIndex = 0;
    nextNoteTime = audioCtx.currentTime + 0.06;
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(0.0001, now);            // 페이드 인 (음소거면 그대로 무음)
    masterGain.gain.linearRampToValueAtTime(targetVol(), now + 0.3);
    scheduler();
    musicTimer = setInterval(scheduler, 25);
  }

  function stopMusic() {
    if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    if (audioCtx && masterGain) {
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(0.0001, now + 0.25);  // 페이드 아웃
    }
  }

  // 게임 종료 징글 — 루프 페이드아웃 후 짧게 울림 (masterGain을 거치지 않고 직접 출력)
  function playEndJingle(win) {
    if (muted || !audioCtx) return;
    const start = audioCtx.currentTime + 0.2;   // 배경 루프 페이드아웃 뒤에
    const notes = win
      ? [523.25, 659.25, 783.99, 1046.50]       // C-E-G-C↑ : 밝은 승리 팡파레
      : [659.25, 587.33, 523.25, 392.00];       // E-D-C-G↓ : 부드러운 마무리
    const step = 0.15;
    notes.forEach((f, i) => {
      const t = start + i * step;
      const last = i === notes.length - 1;
      const dur = last ? 0.7 : step * 1.5;       // 마지막 음은 길게 울려 여운
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + dur + 0.05);
    });
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;  // 칸은 CSS가 반응형으로 크기 결정
    cells = [];
    const count = size * size;
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.index = i;
      c.addEventListener('pointerdown', onCellPress);
      gridEl.appendChild(c);
      cells.push(c);
    }
  }

  function onCellPress(e) {
    if (!playing) return;
    const idx = parseInt(e.currentTarget.dataset.index, 10);
    if (idx === litIndex) {
      // 명중
      const rt = performance.now() - litAt;
      reactionTimes.push(rt);
      score++;
      scoreEl.textContent = score;
      updateAvg();
      cells[litIndex].classList.remove('lit');
      litIndex = -1;
      flash(`<span class="hit">${Math.round(rt)} ms!</span>`);
      scheduleNext(220);
    } else {
      // 빈 칸 — 페널티 (평균에 손해로 반영됨)
      penalties++;
      const c = e.currentTarget;
      c.classList.add('miss');
      setTimeout(() => c.classList.remove('miss'), 250);
      updateAvg();
      flash('<span class="bad">+100ms 페널티</span>');
    }
  }

  // 평균 = (명중 반응속도 합 + 페널티 누적시간) / 명중 횟수
  // 페널티가 평균을 올려서 손해가 되도록 계산
  function effectiveAvg() {
    if (reactionTimes.length === 0) return null;
    const sum = reactionTimes.reduce((a, b) => a + b, 0) + penalties * PENALTY_MS;
    return sum / reactionTimes.length;
  }

  function updateAvg() {
    const avg = effectiveAvg();
    avgEl.textContent = avg === null ? '— ms' : Math.round(avg) + ' ms';
  }

  function flash(html) {
    msgEl.innerHTML = html;
  }

  function scheduleNext(delay) {
    clearTimeout(nextTimeout);
    nextTimeout = setTimeout(litUp, delay);
  }

  function litUp() {
    if (!playing) return;
    let idx;
    do { idx = Math.floor(Math.random() * cells.length); }
    while (idx === litIndex && cells.length > 1);
    litIndex = idx;
    cells[idx].classList.add('lit');
    litAt = performance.now();
  }

  function tick() {
    const remain = Math.max(0, endAt - performance.now());
    timeEl.textContent = (remain / 1000).toFixed(1);
    if (remain <= 0) { endGame(); return; }
    rafId = requestAnimationFrame(tick);
  }

  function startGame() {
    playing = true;
    score = 0;
    penalties = 0;
    litIndex = -1;
    reactionTimes = [];
    scoreEl.textContent = '0';
    avgEl.textContent = '— ms';
    startBtn.disabled = true;
    setToggleEnabled(false);
    flash('집중! 🔥');
    startMusic();                       // 게임 시작과 함께 음악 재생
    endAt = performance.now() + ROUND_MS;
    tick();
    scheduleNext(600);
  }

  function endGame() {
    playing = false;
    stopMusic();                        // 게임 종료와 함께 음악 정지
    cancelAnimationFrame(rafId);
    clearTimeout(nextTimeout);
    if (litIndex >= 0) { cells[litIndex].classList.remove('lit'); litIndex = -1; }
    timeEl.textContent = '0.0';
    startBtn.disabled = false;
    startBtn.textContent = '다시 시작';
    setToggleEnabled(true);

    const rawAvg = effectiveAvg();
    const avg = rawAvg === null ? null : Math.round(rawAvg);

    let result = `끝! 점수 <span class="hit">${score}</span>`;
    if (avg !== null) result += ` · 평균 ${avg}ms`;
    if (penalties > 0) result += ` · 실수 ${penalties}회`;

    // 최고 기록 갱신: 충분히 플레이했고(5히트 이상) 평균이 더 낮을 때
    let newRecord = false;
    if (avg !== null && score >= 5) {
      if (isNaN(best) || avg < best) {
        best = avg;
        localStorage.setItem('reflexGridBest', String(best));
        bestEl.textContent = Math.round(best) + ' ms';
        result += ' 🏆 <span class="hit">신기록!</span>';
        newRecord = true;
      }
    }
    flash(result);
    playEndJingle(newRecord);           // 종료 징글: 신기록이면 승리 팡파레
  }

  function setToggleEnabled(on) {
    sizeToggle.querySelectorAll('button').forEach(b => b.disabled = !on);
  }

  sizeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || playing) return;
    size = parseInt(btn.dataset.size, 10);
    sizeToggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
    buildGrid();
  });

  startBtn.addEventListener('click', startGame);

  function updateMuteUI() {
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('muted', muted);
    muteBtn.title = muted ? '음소거됨 — 켜기' : '소리 켜짐 — 음소거';
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('reflexGridMuted', muted ? '1' : '0');
    updateMuteUI();
    // 게임 중이면 볼륨을 즉시 부드럽게 반영
    if (audioCtx && masterGain && playing) {
      const now = audioCtx.currentTime;
      masterGain.gain.cancelScheduledValues(now);
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(targetVol(), now + 0.12);
    }
  });

  // 초기화
  updateMuteUI();
  buildGrid();
})();
</script>
</body>
</html>
